trigger: none

parameters:
  - name: version
    displayName: 'Engine Tools Version (e.g. 1.0.0) — leave as "none" to skip standard image'
    type: string
    default: 'none'
  - name: ide_version
    displayName: 'IDE image version (e.g. v1, v2) — leave as "none" to skip IDE image'
    type: string
    default: 'none'

stages:
- stage: BuildImage
  displayName: 'Build Docker Image'
  pool:
    name: Azure Pipelines
  jobs:
  - job: BuildDockerImage
    displayName: 'Build and Configure Docker Image'
    steps:
    - task: connect-agent@2
      displayName: 'Hosted agent'
      inputs:
        hostedAgentService: $(agent-id)

    - script: | 
        python3 docker/get_files_ad.py $(repo-owner-ad) "$(project-ad)" $(remote-config-repo) /engine_sast/engine_iac/ConfigTool.json $(ad-at) path
        python3 docker/get_files_ad.py $(repo-owner-ad) "$(project-ad)" $(remote-config-repo) /engine_sca/engine_container/ConfigTool.json $(ad-at) path
        python3 docker/get_files_ad.py $(repo-owner-ad) "$(project-ad)" $(remote-config-repo) /engine_sca/engine_dependencies/ConfigTool.json $(ad-at) path
        python3 docker/get_files_ad.py $(repo-owner-ad) "$(project-ad)" $(remote-config-repo) /engine_core/ConfigTool.json $(ad-at) path
      displayName: 'Get Custom Remote Config'

    - script: python3 docker/get_files_gh.py $(repo-owner) $(project) rules $(gh-at) rules
      displayName: 'Get Custom IAC Rules'

    - script: python3 docker/get_files_gh.py $(repo-owner) $(project) docs $(gh-at) docs
      displayName: 'Get Custom IAC Rules Registry'

    - script: python3 docker/get_certificates.py $(certificate-url)
      displayName: 'Get Custom Certificates'

    - script: python3 docker/get_certificates.py $(certificate-url-ca)
      displayName: 'Get Custom CA Certificate'

    - script: python3 docker/get_kics_binary.py $(repo-owner-ad) "$(project-ad)" $(artifact_name) $(ad-at) $(pipeline_id)
      displayName: 'Get KICS Binary'

    # ── Standard image ────────────────────────────────────────────────────────

    - script: |
        docker build \
          --target standard \
          --build-arg VERSION=${{ parameters.version }} \
          -t $(artifactory-url)/devops/devsecops-engine-tools:${{ parameters.version }}$(FOR_TEST_TAG) \
          -f docker/Dockerfile .
      displayName: 'Build Docker Image (standard)'
      condition: ne('${{ parameters.version }}', 'none')

    - task: ArtifactoryDocker@1
      displayName: Docker Push (standard)
      condition: ne('${{ parameters.version }}', 'none')
      inputs:
        command: 'push'
        repository: 'devops/devsecops-engine-tools'
        artifactoryService: 'Artifactory'
        targetRepo: 'devops/devsecops-engine-tools'
        imageName: '$(artifactory-url)/devops/devsecops-engine-tools:${{ parameters.version }}$(FOR_TEST_TAG)'

    # ── IDE image ─────────────────────────────────────────────────────────────

    - script: |
        docker build \
          --target ide \
          -t $(artifactory-url)/devops/devsecops-engine-tools:ide-${{ parameters.ide_version }} \
          -f docker/Dockerfile .
      displayName: 'Build Docker Image (ide-${{ parameters.ide_version }})'
      condition: ne('${{ parameters.ide_version }}', 'none')

    - task: ArtifactoryDocker@1
      displayName: 'Docker Push (ide-${{ parameters.ide_version }})'
      condition: ne('${{ parameters.ide_version }}', 'none')
      inputs:
        command: 'push'
        repository: 'devops/devsecops-engine-tools'
        artifactoryService: 'Artifactory'
        targetRepo: 'devops/devsecops-engine-tools'
        imageName: '$(artifactory-url)/devops/devsecops-engine-tools:ide-${{ parameters.ide_version }}'
