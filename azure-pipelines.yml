
trigger:
- trunk

pool:
  name: Azure Pipelines

steps:

- task: connect-agent@2
  displayName: 'Hosted agent'
  inputs:
    hostedAgentService: 90469226-70c7-4fd9-acf1-a6f54739e00a

- script: echo "##vso[task.setvariable variable=RELEASE_VERSION]$(Build.SourceBranchName#refs/heads/v)"
  displayName: 'Set lib version'

- script: pwd && ls
  displayName: 'Test'

- script: python3 docker/get_files_ad.py $(repo-owner-ad) $(project-ad) engine_core $(ad-at) actual_remote_config
  displayName: 'Get Custom Remote Config'

- script: python3 docker/get_files_gh.py $(repo-owner) $(project) rules $(gh-at) rules
  displayName: 'Get Custom IAC Rules'

- script: pwd && ls
  displayName: 'Test'

- script: docker build --build-arg VERSION=1 -t bancolombia/devsecops-engine-tools:1 -f docker/Dockerfile . && docker tag bancolombia/devsecops-engine-tools:1 bancolombia/devsecops-engine-tools:1
  displayName: 'Build Docker Image'

- task: ArtifactoryDocker@1
  displayName: Docker Push
  inputs:
    command: 'push'
    repository: 'devops/devsecops-engine-tools'
    artifactoryService: 'Artifactory'
    targetRepo: 'devops/devsecops-engine-tools'
    imageName: 'artifactory.apps.bancolombia.com/devops/devsecops-engine-tools:$(version)'