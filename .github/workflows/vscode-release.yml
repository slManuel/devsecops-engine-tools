name: VSCode Release

on:
  push:
    tags:
      - vscode-v*

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    defaults:
      run:
        working-directory: ide_extension/vscode/devsecops/

    steps:
      # Generate a token of Github APP
      - name: Generate a token of Github APP
        id: generate_token
        uses: actions/create-github-app-token@v2.2.0
        with:
          app-id: ${{ secrets.SEMREL_GITHUB_APP_ID }}
          private-key: ${{ secrets.SEMREL_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          token: ${{ steps.generate_token.outputs.token }}
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Compile extension
        run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Publish to VSCode Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PUBLISH_TOKEN }}
        run: npx @vscode/vsce publish --pat $VSCE_PAT
