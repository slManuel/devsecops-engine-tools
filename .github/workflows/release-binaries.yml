name: Build and Release Binaries

on:
  pull_request:
    types: [closed]
    branches: [trunk]
  push:
    branches:
      - trunk
      - feature/*

jobs:
  build-release-artifacts:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            suffix: ''
          - os: macos-latest
            name: darwin
            suffix: ''
          - os: windows-latest
            name: windows
            suffix: '.exe'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Linux: Build inside Docker container with Ubuntu 20.04
      - name: Build binary on Ubuntu 20.04 container
        if: matrix.name == 'linux'
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ubuntu:20.04 bash -c "
            apt-get update && \
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              python3.12 python3.12-venv python3.12-dev python3-pip \
              build-essential zip curl && \
            python3.12 -m pip install --upgrade pip && \
            python3.12 -m pip install pyinstaller -r tools/requirements.txt && \
            python3.12 -m pyinstaller tools/devsecops_engine_tools/devsecops-engine-tools.spec
          "

      # macOS and Windows setup
      - name: Set up Python (macOS/Windows)
        if: matrix.name != 'linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies (macOS/Windows)
        if: matrix.name != 'linux'
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir pyinstaller -r tools/requirements.txt

      - name: Build Executable (macOS/Windows)
        if: matrix.name != 'linux'
        run: pyinstaller tools/devsecops_engine_tools/devsecops-engine-tools.spec

      # Testing
      - name: Test Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --help

      - name: Test Executable (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --help || echo "Ignore permission errors in docker build"

      # Zip artifacts
      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: tar.exe -a -c -f devsecops-engine-tools.zip dist\\devsecops-engine-tools${{ matrix.suffix }}

      - name: Zip Artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: zip devsecops-engine-tools.zip dist/devsecops-engine-tools${{ matrix.suffix }}

      - name: Upload Artifact
        #if: startsWith(github.ref, 'refs/heads/trunk')
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-engine-tools-${{ matrix.os }}
          path: dist/devsecops-engine-tools*