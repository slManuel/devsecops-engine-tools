name: Build and Release Binaries

on:
  pull_request:
    types:
      - closed
    branches:
      - trunk
  push:
    branches:
      - trunk
      - feature/*
      
jobs:
  build-release-artifacts:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: darwin
            suffix: ''
          - os: ubuntu-latest
            name: linux
            suffix: ''
          - os: windows-latest
            name: windows
            suffix: '.exe'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      PYTHON_VERSION: "3.12"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir -r tools/requirements.txt

      - name: Install PyInstaller
        run: python -m pip install --no-cache-dir pyinstaller

      - name: Build Executable
        run: pyinstaller tools/devsecops_engine_tools/devsecops-engine-tools.spec

      - name: Test Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --help

      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: tar.exe -a -c -f devsecops-engine-tools.zip dist\\devsecops-engine-tools${{ matrix.suffix }}

      - name: Test Executable (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --help

      - name: Zip Artifact (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: zip devsecops-engine-tools.zip dist/devsecops-engine-tools${{ matrix.suffix }}

      - name: Upload Artifact
        #if: startsWith(github.ref, 'refs/heads/trunk')
        uses: actions/upload-artifact@v4
        with:
          name: devsecops-engine-tools-${{ matrix.os }}
          path: dist/devsecops-engine-tools*