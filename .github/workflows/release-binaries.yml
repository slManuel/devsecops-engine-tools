name: Build and Release Binaries

on:
  pull_request:
    branches: [trunk]
    paths-ignore:
      - 'ide_extension/**'
      - '.github/workflows/intellij-build.yml'
      - '.github/workflows/intellij-release.yml'
      - '.github/workflows/intellij-updater.yml'
      - '.github/workflows/vscode-build.yml'
      - '.github/workflows/vscode-release.yml'
  release:
    types: [published]

jobs:
  build-release-artifacts:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            suffix: ''
          - os: macos-latest
            name: darwin
            suffix: ''
          - os: windows-latest
            name: windows
            suffix: '.exe'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      PYTHON_VERSION: "3.10"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # For releases, checkout the specific tag/commit
          # For PRs, checkout the PR branch
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      # Verify we're on the correct commit
      - name: Verify checkout
        run: |
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Tag being released: ${{ github.event.release.tag_name || 'N/A' }}"
          echo "Event name: ${{ github.event_name }}"
          git log --oneline -5
      
      # Linux: Build inside Docker container with Ubuntu 20.04
      - name: Build binary on Ubuntu 20.04 container
        if: matrix.name == 'linux'
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app ubuntu:22.04 bash -c "
            export DEBIAN_FRONTEND=noninteractive && \
            ln -fs /usr/share/zoneinfo/Etc/UTC /etc/localtime && \
            apt-get update && \
            apt-get install -y software-properties-common curl zip build-essential git libpython3.10 && \
            add-apt-repository ppa:deadsnakes/ppa -y && \
            apt-get update && \

            # apt-get install -y python3.10 python3.10-venv python3.10-dev && \

            curl -sS https://bootstrap.pypa.io/get-pip.py | python3.10 && \
            python3 --version && \
            python3 -m pip install --no-cache-dir --upgrade pip && \
            python3 -m pip install --no-cache-dir pyinstaller -r tools/requirements.txt && \
            echo 'Building version:' && python3 -c 'from tools.devsecops_engine_tools.version import version; print(version)' && \
            pyinstaller tools/devsecops_engine_tools/devsecops-engine-tools.spec"

      #macOS and Windows setup
      - name: Set up Python (macOS/Windows)
        if: matrix.name != 'linux'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies (macOS/Windows)
        if: matrix.name != 'linux'
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir pyinstaller -r tools/requirements.txt

      - name: Verify version before build (macOS/Windows)
        if: matrix.name != 'linux'
        run: |
          python -c "import sys; sys.path.append('tools'); from devsecops_engine_tools.version import version; print(f'Building version: {version}')"

      - name: Build Executable (macOS/Windows)
        if: matrix.name != 'linux'
        run: pyinstaller tools/devsecops_engine_tools/devsecops-engine-tools.spec

      # Testing
      - name: Test Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --version

      - name: Test Executable (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --version || echo "Ignore permission errors in docker build"

      # Zip artifacts
      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest' && github.event.action == 'published'
        run: |
          cd dist
          tar.exe -a -c -f ../devsecops-engine-tools-${{ matrix.name }}.zip devsecops-engine-tools${{ matrix.suffix }}

      - name: Zip Artifact (Linux/macOS)
        if: matrix.os != 'windows-latest' && github.event.action == 'published'
        run: |
          cd dist
          zip ../devsecops-engine-tools-${{ matrix.name }}.zip devsecops-engine-tools${{ matrix.suffix }}

      - name: Upload Release Asset
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          files: devsecops-engine-tools-${{ matrix.name }}.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}