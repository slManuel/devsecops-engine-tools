name: Build and Release Binaries

on:
  push:
    branches:
      - 'feature/**'

jobs:
  build-release-artifacts:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: darwin
            suffix: ''
          - os: ubuntu-latest
            name: linux
            suffix: ''
          - os: windows-latest
            name: windows
            suffix: '.exe'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      PYTHON_VERSION: "3.8"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pipenv
        run: |
          python -m pip install --no-cache-dir --upgrade pipenv

      - name: Install Dependencies and Run PyInstaller
        run: |
          pipenv sync
          pipenv run pip install pyinstaller

      - name: Build Executable
        run: pipenv run pyinstaller tools/devsecops_engine_tools/devsecops-engine-tools.spec

      - name: Test Executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --help

      - name: Zip Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: tar.exe -a -c -f devsecops-engine-tools.zip dist\\devsecops-engine-tools${{ matrix.suffix }}

      - name: Test Executable (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: ./dist/devsecops-engine-tools${{ matrix.suffix }} --help

      - name: Zip Artifact (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: zip devsecops-engine-tools.zip dist/devsecops-engine-tools${{ matrix.suffix }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: devsecops-engine-tools.zip
          asset_name: devsecops-engine-tools_${{ matrix.name }}_x86_64.zip
          asset_content_type: application/zip